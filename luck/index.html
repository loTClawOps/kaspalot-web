<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 幸运抽奖-闹元宵</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 密码验证层 -->
    <div id="passwordOverlay" class="password-overlay">
        <div class="password-box">
            <h2>🔒 请输入访问密码</h2>
            <input type="password" id="passwordInput" placeholder="请输入密码" maxlength="10">
            <button id="passwordBtn" class="btn btn-primary">进入系统</button>
            <p id="passwordError" class="password-error">密码错误，请重试</p>
        </div>
    </div>
    
    <div class="bg-overlay"></div>
    
    <div class="container">
        <h1 class="title">🎰 幸运抽奖-闹元宵</h1>
        
        <div class="main-content">
            <!-- 左侧：设置面板 -->
            <div class="settings-panel" id="settingsPanel">
                <div class="panel-toggle" id="panelToggle" title="展开/收起设置">
                    <span class="toggle-icon">◀</span>
                </div>
                
                <div class="panel-content" id="panelContent">
                    <div class="panel-section">
                        <h3>📝 抽奖名单</h3>
                        <textarea id="namesInput" placeholder="输入名字或编号，每行一个&#10;例如：&#10;1&#10;2&#10;3">
星辰突破奖
极光卓越奖
量子跃迁奖
匠心独运奖
破壁先锋奖
星火燎原奖
蓝海领航奖
韧性之光奖
智汇巅峰奖
未来塑造奖
                    </textarea>
                        <button id="updateNamesBtn" class="btn btn-primary">更新名单</button>
                    </div>
                    
                    <div class="panel-section">
                        <h3>🖼️ 背景设置</h3>
                        <input type="file" id="bgImageInput" accept="image/*" hidden>
                        <button id="uploadBgBtn" class="btn btn-secondary">上传背景图</button>
                        <button id="resetBgBtn" class="btn btn-text">恢复默认</button>
                    </div>
                    
                    <div class="panel-section">
                        <h3>⚙️ 其他设置</h3>
                        <label>
                            <input type="checkbox" id="removeWinner">
                            中奖后移除该名字
                        </label>
                    </div>
                    
                    <div class="panel-section history-section">
                        <h3>🏆 中奖记录</h3>
                        <ul id="historyList"></ul>
                        <button id="clearHistoryBtn" class="btn btn-text">清空记录</button>
                    </div>
                </div>
            </div>
            
            <!-- 中间：转盘 -->
            <div class="wheel-container">
                <div class="wheel-wrapper">
                    <canvas id="wheelCanvas" width="500" height="500"></canvas>
                    <div class="pointer">▼</div>
                </div>
                <button id="spinBtn" class="spin-btn">开始抽奖 <span class="shortcut">(空格)</span></button>
            </div>
        </div>
    </div>
    
    <!-- 中奖弹窗 -->
    <div id="winnerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>🎉 恭喜中奖！</h2>
            <div id="winnerName" class="winner-name"></div>
            <button id="continueBtn" class="btn btn-primary">继续抽奖</button>
        </div>
    </div>
    
    <footer class="footer">@本系统由Openclaw智能体自动生成,自动维护</footer>
    <script src="script.js"></script>
</body>
</html>
